# This is a Databricks asset bundle definition for governer.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: governer
  uuid: 31929971-43eb-464d-902b-e62b214ecba6

include:
  - resources/*.yml
  - resources/*/*.yml

artifacts:
  python_artifact:
    type: whl
    build: uv build --wheel

# Variable declarations. These variables are assigned in the dev/prod targets below.
variables:
  catalog:
    description: The catalog to use
  schema:
    description: The schema to use
  volume:
    description: Volume to use
  warehouse:
    description: Warehouse to use
  govern_table:
    description: Govern table to use

targets:
  dev:
    # The default target uses 'mode: development' to create a development copy.
    # - Deployed resources get prefixed with '[dev my_user_name]'
    # - Any job schedules and triggers are paused by default.
    # See also https://docs.databricks.com/dev-tools/bundles/deployment-modes.html.
    mode: development
    default: true
    workspace:
      host: https://dbc-a645eeef-df9b.cloud.databricks.com
    variables:
      catalog: governer
      schema: ${workspace.current_user.short_name}
      volume: source
      warehouse: db53e023d60fba04
      govern_table: govern_table
  prod:
    mode: production
    workspace:
      host: https://dbc-a645eeef-df9b.cloud.databricks.com
      # We explicitly deploy to /Workspace/Users/uharabtsou@gmail.com to make sure we only have a single copy.
      root_path: /Workspace/Users/uharabtsou@gmail.com/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: governer
      schema: default
      volume: source
      warehouse: db53e023d60fba04
      govern_table: govern_table
    permissions:
      - user_name: uharabtsou@gmail.com
        level: CAN_MANAGE
