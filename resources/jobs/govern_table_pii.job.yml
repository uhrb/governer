resources:
  jobs:
    govern_table_pii_job:
      name: govern_table_pii_job
      description: "This job inspects known tables and govern that it contain or not PII data"
      tags:
        purpose: data_governance
        operator: ai
      parameters:
        - name: catalog
          default: ${var.catalog}
        - name: schema
          default: ${var.schema}
        - name: govern_table
          default: ${var.govern_table}
        - name: warehouse
          default: ${var.warehouse}

      tasks:
        - task_key: table
          environment_key: default
          notebook_task:
            notebook_path: ../../src/ai/ai_tables_pii.ipynb
          

      environments:
        - environment_key: default
          spec:
            environment_version: "4"
            dependencies:
              - ../../dist/*.whl